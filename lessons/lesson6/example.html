<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            width: 80%;
            min-width: 650px;
            max-width: 800px;
            margin: 0 auto;
            border-collapse: collapse;
            font-family: Arial, Helvetica, sans-serif;

        }

        caption {
            text-align: right;
            color: grey;
            text-transform: uppercase;
            font-weight: 700;
        }

        th {
            text-transform: uppercase;
            color: #fff
        }

        th,
        td {
            text-align: center;
            padding: 1mm 0;
        }

        tr td:first-child {
            text-align: left;
            color: #666;
            padding-left: 0.7mm;
        }

        .col-1 {
            background-color: #ddd;
            width: auto;
        }

        .col-2 {
            background-color: #1fd2ff;
            width: 17%;
        }

        .col-3 {
            background-color: #1bff13;
            width: 17%;
        }

        .col-4 {
            background-color: #ffe81b;
            width: 17%;
        }

        .col-5 {
            background-color: #ff0000;
            width: 17%;
        }
        span{
            color: #fff;
            font-weight: 700;
            font-size: 1.2mm;
            display: inline-block;
            border: 2px solid #fff;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            line-height: 25px;
        }
        thead{
            border-bottom:1px solid #bdb9b9
        }
        tfoot{
            border-top: 1px solid #aaa5a5;
        }
    </style>
</head>
