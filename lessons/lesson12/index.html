<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid-container {
            width: 80vw;

            margin: 1.2em auto;
            padding: 1.1em;

            background-color: cadetblue;

            display: grid;

            grid-template-columns: repeat(3, 1fr);
            gap: 1.1em;
        }

        .grid-container div:nth-child(1) {
            grid-column-start: 1;
            grid-column-end: 4;
            grid-column: 1 / span 3;
            grid-column: 1 / span 2;
            grid-area: 1/1/3/4
        }

        .grid-container div:nth-child(2) {
            grid-area: 1/4/4/5
        }


        .grid-container div {
            width: 100%;
            height: auto;

            background-color: beige;
            border: darkslategray solid 2px;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Arial, Helvetica, sans-serif;
        }

        * {}

        .container {
            margin: 1.1em auto;
            box-sizing: border-box;
            min-height: 100vh;
            max-width: 100vw;

            display: grid;
            grid-template-columns: 1fr, 3fr 1fr;
            grid-template-rows: 10vh 1fr 5vh;
            grid-template-areas:
                'header header header'
                'menu main right'
                'footer footer footer'
            ;
        }

        .container div {
            background-color: beige;
            border: cadetblue solid 2px;
        }

        .menu {
            grid-area: menu;
        }

        .main {
            grid-area: main;
        }

        .right {
            grid-area: right;
        }

        .footer {
            grid-area: footer;
        }

        .header {
            grid-area: header;
            display: flex;
            gap: 0.4em;
            padding: 0.2em;
            justify-content: center;
        }

        .header div {
            border: none;
            text-transform: uppercase;
            font-family: Arial, Helvetica, sans-serif;
            transition: all 0.35s ease;
        }
        .header div:nth-child(3){
            margin-left:auto;
        }
        .header div:hover{
            text-shadow: 2px 2px 15px black;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div>Home</div>
            <div>Search</div>
            <div>Log out</div>
        </div>
        <div class="menu">menu</div>
        <div class="main">
            <div class="grid-container">
                <div>1</div>
                <div>2</div>
                <div>3</div>
                <div>4</div>
                <div>5</div>
                <div>6</div>
                <div>7</div>
            </div>
        </div>
        <div class="right">right</div>
        <div class="footer">footer</div>

    </div>


</body>

</html>
