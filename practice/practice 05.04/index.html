<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <!-- footer -->
    <div class="bg-body-tertiary container-fluid border-bottom py-2">
        <div class="row align-items-center">
            <div class="col d-flex align-items-center">
                <div class="p-2 border rounded bg-light me-2">
                    <img src="./recources/ad.png" alt="logo">
                </div>
                <b class="text-secondary">AD'S BOARD</b>
            </div>

            <div class="col-auto d-flex align-items-center">
                <button class="btn btn-warning p-2 me-3">
                    + New ad
                </button>
                <img src="./recources/av_64.png" class="rounded-circle me-1" width="32" height="32">
                <a href="#" class="text-decoration-none">My profile</a>
            </div>
        </div>
    </div>
    <!-- search menu -->
    <div class="bg-primary-subtle container-fluid border-bottom py-3 px-5">
        <div class="row g-2 align-items-center justify-content-center">

            <div class="col d-flex align-items-center bg-white border rounded overflow-hidden p-0">
                <div class="bg-light px-3 py-2 border-end">
                    <img src="./recources/search.svg" width="16" alt="search">
                </div>
                <div class="ps-3 flex-grow-1 text-secondary">
                    11 999 345 ads near you
                </div>
            </div>

            <div class="col d-flex align-items-center bg-white border rounded overflow-hidden p-0">
                <div class="bg-light px-3 py-2 border-end">
                    <img src="./recources/geo-alt-fill.svg" width="16" alt="geo">
                </div>
                <div class="ps-3 flex-grow-1 text-secondary">
                    Kiev, Kiev area
                </div>
            </div>

            <div class="col-auto">
                <button class="btn btn-primary px-4 py-2 fw-medium">
                    Search
                </button>
            </div>

        </div>
    </div>
    <!-- category -->
    <div class="container mt-4 border border-warning">
        <div class="row row-cols-2 row-cols-sm-3 row-cols-lg-5">
            <div class="col px-2 m-3"></div>
            <div class="col px-2 m-3"></div>
            <div class="col px-2 m-3"></div>
            <div class="col px-2 m-3"></div>
            <div class="col px-2 m-3"></div>
</body>

</html>
