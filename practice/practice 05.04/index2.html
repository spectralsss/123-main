<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad's Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .ad-img {
            width: 120px;
            height: 100px;
            object-fit: contain;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: none;
            border-color: #ced4da;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar bg-white border-bottom mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold text-secondary" href="#">
                <img src="recources/ad.png" width="30" class="me-2"> AD'S BOARD
            </a>
            <div class="ms-auto d-flex align-items-center">
                <button class="btn btn-warning btn-sm me-3 fw-bold">+ New ad</button>
                <img src="recources/account.png" width="30" class="rounded-circle me-1">
                <span class="small">My profile</span>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <form class="row g-2">
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text bg-white"><img src="recources/search.svg" width="16"></span>
                            <input type="text" class="form-control" placeholder="wardrobe">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text bg-white"><img src="recources/geo-alt-fill.svg"
                                    width="16"></span>
                            <input type="text" class="form-control" placeholder="Kiev, Shevchenkovskiy">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <select class="form-select">
                            <option>House & garden</option>
                        </select>
                    </div>
                </form>
            </div>
        </div>

        <div class="card mb-3 border-0 shadow-sm">
            <div class="row g-0 align-items-center">
                <div class="col-auto p-2">
                    <img src="recources/furniture_1.png" class="ad-img">
                </div>
                <div class="col p-3">
                    <div class="d-flex justify-content-between">
                        <h5 class="text-primary">Italian wooden wardrobe</h5>
                        <span class="fw-bold">120$</span>
                    </div>
                    <p class="small text-muted mb-0">
                        <img src="recources/geo-alt-fill.svg" width="12"> Kiev, Shevchenkovskiy
                        <span class="ms-3">Today at 10:45</span>
                    </p>
                </div>
            </div>
        </div>

        <div class="card mb-3 border-0 shadow-sm">
            <div class="row g-0 align-items-center">
                <div class="col-auto p-2">
                    <img src="recources/furniture_2.png" class="ad-img">
                </div>
                <div class="col p-3">
                    <div class="d-flex justify-content-between">
                        <h5 class="text-primary">Sell used wardrobe</h5>
                        <span class="fw-bold">50$</span>
                    </div>
                    <p class="small text-muted mb-0">
                        <img src="recources/geo-alt-fill.svg" width="12"> Kiev, Shevchenkovskiy
                        <span class="ms-3">Today at 9:24</span>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-top mt-5 py-4">
        <div class="container d-flex align-items-center">
            <img src="recources/ad_bw.png" width="50" class="me-4">
            <div class="row w-100 small text-muted">
                <div class="col-4">Mobile applications<br>Paid services</div>
                <div class="col-4">AD'S BOARD Blog<br>Safety regulations</div>
                <div class="col-4">Work at AD'S BOARD<br>Map of Regions</div>
            </div>
        </div>
    </footer>

</body>

</html>
