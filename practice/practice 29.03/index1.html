<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {

            background: url('https://plus.unsplash.com/premium_photo-1669748157617-a3a83cc8ea23?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8c2VhJTIwYmVhY2h8ZW58MHx8MHx8fDA%3D') no-repeat center center fixed;
            background-size: cover;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 600px;
        }

        .row {
            display: flex;
            margin-bottom: 15px;
            align-items: center;
        }

        label {
            width: 120px;
            font-size: 14px;
        }

        .inputs {
            display: flex;
            gap: 10px;
            flex: 1;
        }

        input,
        select,
        textarea {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 8px;
            flex: 1;
           
        }

        textarea {
            height: 80px;
            
        }

        button {
            width: 100%;
            background: none;
            border: 1px solid white;
            color: white;
            padding: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: rgb(56, 56, 56);
        }
    </style>
</head>

<body>

    <div class="form-box">
        <h2>Contact form</h2>
        <p style="font-size: 12px;">Please fill in your information and we'll be sending your order.</p>

        <form>
            <div class="row">
                <label>Your name</label>
                <div class="inputs">
                    <input type="text" placeholder="First name">
                    <input type="text" placeholder="Last name">
                </div>
            </div>

            <div class="row">
                <label>Your email</label>
                <input type="email" placeholder="your_mail@mail.com">
            </div>

            <div class="row">
                <label>Phone *</label>
                <div class="inputs">
                    <input type="text" placeholder="###">
                    <input type="text" placeholder="###">
                    <input type="text" placeholder="####">
                </div>
            </div>

            <div class="row">
                <label>Message subject *</label>
                <select>
                    <option>Other</option>
                    <option>Support</option>
                    <option>Order status</option>
                </select>
            </div>

            <div class="row" style="align-items: flex-start;">
                <label>Message *</label>
                <textarea></textarea>
            </div>

            <button type="submit">SUBMIT FORM</button>
        </form>
    </div>

</body>

</html>
