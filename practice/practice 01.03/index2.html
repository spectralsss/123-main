<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>123</title>
    <style>
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
        } 
        .container {
            width: 300px;
            height: 200px;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #dddddd;
        }
        .heart-icon {
            width: 80px; 
            height: auto;
            
           
            filter: grayscale(100%); 
            
        
            transition: transform 5s ease, filter 5s ease;
        }
        .container:hover .heart-icon {
           
            filter: grayscale(0%);
    
            transform: scale(1.5); 
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="./recources/favorites.png" alt="Серце" class="heart-icon">
    </div>

</body>
</html>
