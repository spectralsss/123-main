<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>123</title>
    <style>
       
        body {
            background-color: blanchedalmond;
            margin: 0;
            padding: 50px;
            text-align: center;
        }

        
        .progress {
            width: 400px;
            height: 100px;
            border: 5px solid cadetblue; 
            background-color: white;
            margin: 50px auto;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: 2px 2px 10px black;
            cursor: pointer;
        }

       
        .bar {
            width: 100px;
            height: 100%;
            background-color: orange;
            position: absolute;
            left: 0;
            transition: left 2s ease-in-out;
        }

       
        .progress:hover .bar {
            left: 300px; 
        }
    </style>
</head>
<body>

    <h1>Progress Bar</h1>
    <p>Наведи мишкою на рамку, щоб він поїхав:</p>

    <div class="progress">
        <div class="bar"></div>
    </div>

</body>
</html>
