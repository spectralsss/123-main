<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #fdf6c4;
            text-align: center;
            font-family: sans-serif;
            padding-top: 50px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            height: 300px;
            overflow: hidden;
            border-bottom: 2px solid #ccc;
        }

        .icon {
            width: 100px;
            transform: translateY(300px);
            transition: transform 2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .container:hover .icon {
            transform: translateY(0);
        }

     
        .icon:nth-child(2) { transition-delay: 0.5s; }
        .icon:nth-child(3) { transition-delay: 1s; }
        .icon:nth-child(4) { transition-delay: 1.5s; }
        .icon:nth-child(5) { transition-delay: 2s; }
    </style>
</head>
<body>

    <h1>Hello, my site!</h1>
    <p>(Наведіть мишку вниз, щоб іконки виїхали)</p>

    <div class="container">
        <img src="./recources/calc.png" class="icon">
        <img src="./recources/book.png" class="icon">
        <img src="./recources/paper.png" class="icon">
        <img src="./recources/pallete.png" class="icon">
        <img src="./recources/pencil.png" class="icon">
    </div>

</body>
</html>
