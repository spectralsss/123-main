<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Магазин товарів</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .product {
            background-color: white;
            border: 1px solid #ccc;
            width: 250px;
            padding: 15px;
            text-align: center;
        }

        .product img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 15px;
        }

        .product h3 {
            font-size: 18px;
            margin: 10px 0;
        }

        .product p {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        .product .price {
            color: #e74c3c;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .product button {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 10px 20px;
            
            border-radius: 3px;
        }

        .product button:hover {
            background-color: #34495e;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="product">
            <img src="./frog/frog-1.jpg" alt="Товар">
            <h3>Назва товару</h3>
            <p>Короткий опис товару</p>
            <div class="price">1000 грн</div>
            <button>Купити</button>
        </div>

        <div class="product">
            <img src="./frog/frog-1.jpg" alt="Товар">
            <h3>Назва товару</h3>
            <p>Короткий опис товару</p>
            <div class="price">1000 грн</div>
            <button>Купити</button>
        </div>

        <div class="product">
            <img src="./frog/frog-1.jpg" alt="Товар">
            <h3>Назва товару</h3>
            <p>Короткий опис товару</p>
            <div class="price">1000 грн</div>
            <button>Купити</button>
        </div>
    </div>

</body>

</html>
