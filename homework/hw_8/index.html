        }

        table {
            border-collapse: collapse;
            width: 800px;

        }

        th,
        td {
            padding: 15px;
            border: 1px solid #ddd;
            text-align: center;
            background: white;

        }


        thead th {
            position: sticky;
            top: 0;
            background: lightblue;
            z-index: 2;

        }


        tr td:nth-child(1),
        tr th:nth-child(1) {
            position: sticky;
            left: 0;
            background: lightcyan;
            z-index: 1;
            font-weight: bold;
        }


        tr th:first-child {
            z-index: 3;
        }


        tr:nth-child(even) td {
            background: #f2f2f2;
        }
    </style>
</head>
