<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
        }

        .product {
            border: 1px solid black;
            width: 150px;
            padding: 15px;
            border-radius: 10px;
            background-color: whitesmoke;
            box-sizing: border-box;
        }

        .product img {
            width: 80px;
            height: auto;
            margin-bottom: 15px;
        }

        .product p {
            margin: 0;
            font-size: 14px;
        }

        .footer {
            margin-top: 30px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            font-weight: bold;
        }

        hr {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 40px auto 10px;
            width: 80%;
        }
    </style>
</head>

<body>
    <h1>What do I have in my friedge</h1>
    <div class="container">
        <div class="product">
            <img src="./recources/Food_C247-128.png">
            <p>Pepper</p>
        </div>
        <div class="product">
            <img src="./recources/Food_C205-128.png">
            <p>Fish</p>
        </div>
        <div class="product">
            <img src="./recources/Food_C217-128.png">
            <p>Cheese</p>
        </div>
        <div class="product">
            <img src="./recources/Food_C225-128.png">
            <p>Beef</p>
        </div>
        <div class="product">
            <img src="./recources/Food_C235-128.png">
            <p>Coriander</p>
        </div>
        <div class="product">
            <img src="./recources/Food_C238-128.png">
            <p>Garlic</p>
        </div>
        <div class="product">
            <img src="./recources/Food_C239-128.png">
            <p>Mushroom</p>
        </div>
        <div class="product">
            <img src="./recources/Food_C240-128.png">
            <p>Apple</p>
        </div>
        <div class="product">
            <img src="./recources/Food_C245-128.png">
            <p>Corn</p>
        </div>
        <div class="product">
            <img src="./recources/Food_C203-128.png">
            <p>Egg</p>
        </div>
        <hr>
    </div>
    <div class="footer">
        thats all...
    </div>
</body>

</html>
