<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Список фруктів</title>
<style>
    body {
        font-family: Arial, sans-serif;
    }

    .list {
        background-color: #f2b6be; 
        padding: 20px;
        width: 300px;
    }

    .list li {
        background-color: #c56a75; 
        margin: 10px 0;
        padding: 10px;
        color: white;
        list-style-position: inside;
    }

    .list li span {
        background-color: #8e3b45; 
        padding: 5px 10px;
    }
</style>
</head>
<body>

<ol class="list">
    <li><span>Apple</span></li>
    <li><span>Orange</span></li>
    <li><span>Pineapple</span></li>
    <li><span>Pear</span></li>
    <li><span>Cherry</span></li>
</ol>

</body>
</html>
