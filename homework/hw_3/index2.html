<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<style>
    .todo-list {
        margin: 20px;
        padding: 20px;
        background-color: #d9eaf2;
    }

    .todo-list li {
        margin: 5px 0;
        padding: 10px;
    }

    .blue {
        background-color: #9cc3d5;
    }

    .gray {
        background-color: #cfcfcf;
    }

    .done {
        text-decoration: line-through;
    }
</style>

<body>

    <h2>My To Do List</h2>

    <ul class="todo-list">
        <li class="blue">☐ Hit the gym ✖</li>
        <li class="gray done">☑ Pay bills ✖</li>
        <li class="blue">☐ Meet John ✖</li>
        <li class="blue">☐ Buy eggs ✖</li>
        <li class="gray done">☑ Read a book ✖</li>
        <li class="blue">☐ Organize office ✖</li>
        <li class="blue">☐ Eat dinner ✖</li>
        <li class="blue">☐ Buy apples ✖</li>
        <li class="blue">☐ Meet George ✖</li>
        <li class="blue">☐ Feed the cat ✖</li>
        <li class="gray done">☑ Write a letter ✖</li>
        <li class="blue">☐ Run 1 km ✖</li>
    </ul>

</html>
